<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SmallLang WebAssembly</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <img src="../../assets/smalllang-logo.svg" alt="SmallLang" width="48" height="48">
      <div>
        <h1>SmallLang WebAssembly</h1>
        <p id="status">Ready</p>
      </div>
      <button id="run" type="button">Run</button>
    </header>

    <section class="runner" aria-label="SmallLang output">
      <pre id="output" aria-live="polite"></pre>
    </section>
  </main>

  <script src="smalllang-browser.js"></script>
</body>
</html>
