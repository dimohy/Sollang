<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">SmallLang logo</title>
  <desc id="desc">A square SmallLang logo with SL letters, code brackets, and a value-flow arrow.</desc>
  <defs>
    <linearGradient id="background" x1="64" y1="32" x2="448" y2="480" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#14213d" />
      <stop offset="0.58" stop-color="#101820" />
      <stop offset="1" stop-color="#090f1f" />
    </linearGradient>
    <linearGradient id="letter" x1="150" y1="128" x2="362" y2="286" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" />
      <stop offset="1" stop-color="#d9f99d" />
    </linearGradient>
    <linearGradient id="flow" x1="130" y1="332" x2="372" y2="332" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38bdf8" />
      <stop offset="0.54" stop-color="#5eead4" />
      <stop offset="1" stop-color="#84cc16" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#020617" flood-opacity="0.36" />
    </filter>
  </defs>

  <rect width="512" height="512" rx="72" fill="url(#background)" />
  <path d="M92 151h328M92 256h328M92 361h328M151 92v328M256 92v328M361 92v328" fill="none" stroke="#8bd3ff" stroke-width="1.5" opacity="0.13" />
  <path d="M130 138 76 256l54 118" fill="none" stroke="#38bdf8" stroke-width="26" stroke-linecap="round" stroke-linejoin="round" opacity="0.92" />
  <path d="M382 138 436 256l-54 118" fill="none" stroke="#fbbf24" stroke-width="26" stroke-linecap="round" stroke-linejoin="round" opacity="0.92" />

  <g filter="url(#shadow)">
    <text x="256" y="270" text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="154" font-weight="800" fill="url(#letter)">SL</text>
    <path d="M145 334h174" fill="none" stroke="url(#flow)" stroke-width="30" stroke-linecap="round" />
    <path d="M307 288 374 334l-67 46z" fill="#84cc16" />
    <path d="M153 334h143" fill="none" stroke="#f8fafc" stroke-width="6" stroke-linecap="round" opacity="0.72" />
    <circle cx="145" cy="334" r="19" fill="#fbbf24" />
    <circle cx="145" cy="334" r="7" fill="#101820" opacity="0.78" />
  </g>
</svg>
